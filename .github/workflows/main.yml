name: .NET Reqnroll Automation Tests

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      test_type:
        description: "Select which tests to run"
        required: true
        default: "All"
        type: choice
        options:
          - UI
          - API
          - All
      browser:
        description: "Select browser"
        required: true
        default: "Chrome"
        type: choice
        options:
          - Chrome
          - Edge
          - Both

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run tests with selected filters
        run: |
          echo "Running tests for: ${{ github.event.inputs.test_type }}"
          if [ "${{ github.event.inputs.test_type }}" = "UI" ]; then
            dotnet test UI_Automation --logger "trx;LogFileName=all-tests.trx"
          elif [ "${{ github.event.inputs.test_type }}" = "API" ]; then
            dotnet test API_Automation --logger "trx;LogFileName=all-tests.trx"
          else
            dotnet test --logger "trx;LogFileName=all-tests.trx"
          fi

      - name: Generate HTML Report
        run: |
          dotnet tool install -g trx2html
          trx2html -i **/TestResults/all-tests.trx -o TestResults/report.html

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: TestResults/report.html

      - name: Upload TRX Report (optional)
        uses: actions/upload-artifact@v4
        with:
         name: trx-results
         path: |
          **/TestResults/*.trx


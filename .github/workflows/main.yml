name: .NET Reqnroll Automation Tests

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      test_type:
        description: "Select which tests to run"
        required: true
        default: "All"
        type: choice
        options:
          - UI
          - API
          - All
      browser:
        description: "Select browser"
        required: true
        default: "Chrome"
        type: choice
        options:
          - Chrome
          - Edge
          - Both

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      #  Checkout source
      - name: Checkout code
        uses: actions/checkout@v4

      #  Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      #  Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      #  Build solution
      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      #  Run tests (Allure.Reqnroll will automatically generate allure-results & allure-report)
      - name: Run tests with Allure.Reqnroll
        run: |
          echo "Running tests for: ${{ github.event.inputs.test_type }}"
          if [ "${{ github.event.inputs.test_type }}" = "UI" ]; then
            dotnet test UI_Automation --logger "trx;LogFileName=ui-tests.trx"
          elif [ "${{ github.event.inputs.test_type }}" = "API" ]; then
            dotnet test API_Automation --logger "trx;LogFileName=api-tests.trx"
          else
            dotnet test --logger "trx;LogFileName=all-tests.trx"
          fi

      #  Upload Allure Reports (UI + API)
      - name: Upload Allure Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-reports
          path: |
            UI_Automation/allure-report/**
            API_Automation/allure-report/**

      #  Upload Allure Results (raw JSONs)
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: |
            UI_Automation/allure-results/**
            API_Automation/allure-results/**

      #  Upload TRX Results
      - name: Upload TRX Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-results
          path: "**/TestResults/*.trx"

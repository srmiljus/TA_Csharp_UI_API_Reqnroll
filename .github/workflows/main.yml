name: .NET Reqnroll Automation Tests

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      test_type:
        description: "Select which tests to run"
        required: true
        default: "All"
        type: choice
        options:
          - UI
          - API
          - All
      browser:
        description: "Select browser"
        required: true
        default: "Chrome"
        type: choice
        options:
          - Chrome
          - Edge
          - Both

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Install Allure.Reqnroll tool globally so "logger Allure" is recognized
      - name: Install Allure Reqnroll logger
        run: dotnet tool install --global "Allure.Reqnroll"

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # Build the solution
      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      # Run tests (Allure logger will generate allure-results & allure-report)
      - name: Run tests with Allure.Reqnroll
        run: |
          echo "Running tests for: ${{ github.event.inputs.test_type }}"
          if [ "${{ github.event.inputs.test_type }}" = "UI" ]; then
            dotnet test UI_Automation --logger "trx;LogFileName=ui-tests.trx" --logger "Allure"
          elif [ "${{ github.event.inputs.test_type }}" = "API" ]; then
            dotnet test API_Automation --logger "trx;LogFileName=api-tests.trx" --logger "Allure"
          else
            dotnet test --logger "trx;LogFileName=all-tests.trx" --logger "Allure"
          fi

      # Upload Allure Reports (from both UI & API projects)
      - name: Upload Allure Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-reports
          path: |
            UI_Automation/allure-report/**
            API_Automation/allure-report/**

      # Upload Allure Results (raw JSON for manual rebuild if needed)
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: |
            UI_Automation/allure-results/**
            API_Automation/allure-results/**

      # Upload TRX logs (for optional Azure or debugging)
      - name: Upload TRX Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trx-results
          path: "**/TestResults/*.trx"
